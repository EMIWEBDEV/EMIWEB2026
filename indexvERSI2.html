<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Tabel Analisa Sampel</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container mt-5">
            <h4 class="mb-4">Laporan Hasil Analisa Sampel</h4>
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th rowspan="2">No</th>
                            <th rowspan="2">Nama Sampel</th>
                            <th rowspan="2">Tanggal</th>
                            <th colspan="9">Result</th>
                        </tr>
                        <tr>
                            <th>Analisa 1</th>
                            <th>Analisa 2</th>
                            <th>Analisa 3</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Sampel A</td>
                            <td>2025-08-07</td>
                            <td>5.2</td>
                            <td>7.1</td>
                            <td>6.5</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
